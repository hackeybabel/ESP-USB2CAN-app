  <path d="M76 366H436" stroke="url(#road)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <rect x="154" y="360" width="24" height="12" rx="6" fill="#93C5FD"/>
  <rect x="334" y="360" width="24" height="12" rx="6" fill="#93C5FD"/>

